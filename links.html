<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TURBO PLAY</title>

<style>

body{
margin:0;
background:#381856;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
background:#2c1b59;
width:100%;
text-align:center;
padding:20px;
}

header h1{
color:cyan;
font-size:48px;
margin:0;
}

#buscador{
margin:20px;
width:300px;
}

#buscador input{
width:100%;
padding:10px;
border-radius:8px;
border:2px solid cyan;
background:#1a1a2e;
color:white;
font-size:16px;
}

#categorias{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.categoria-link{
background:#2c1b59;
color:cyan;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.categoria-link:hover{
background:cyan;
color:#2c1b59;
}

#resultados{
margin-top:20px;
width:300px;
}

#resultados a{
color:white;
text-decoration:none;
display:block;
padding:5px;
}

#resultados a:hover{
color:cyan;
}

</style>
</head>

<body>

<header>
<h1>Menu</h1>
</header>

<div id="buscador">
<input type="text" id="buscar" placeholder="🔎 Buscar juego..." onkeyup="buscarJuego()">

<div id="categorias">

<a class="categoria-link" href="5to_link.html" target="centro">Casuales</a>
</div>

<script>

const juegos = [

function buscarJuego(){

let input=document.getElementById("buscar").value.toLowerCase();
let contenedor=document.getElementById("resultados");

contenedor.innerHTML="";

if(input===""){
return;
}

let resultados=juegos.filter(j=>j.nombre.toLowerCase().includes(input));

resultados.forEach(j=>{
contenedor.innerHTML+=`<a href="${j.url}" target="centro">${j.nombre}</a>`;
});

}
